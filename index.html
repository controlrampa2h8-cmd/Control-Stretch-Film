<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Stretch Control</title>
    <style>
        :root {
            --bg-dark: #0f172a; --panel-bg: #1e293b; --neon-blue: #00f3ff; --neon-pink: #ff007f; 
            --text-light: #f8fafc; --text-muted: #94a3b8; --border: #334155; --border-glow: rgba(0, 243, 255, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-box { background: var(--panel-bg); padding: 3rem; border-radius: 12px; border: 1px solid var(--neon-blue); box-shadow: 0 0 30px var(--border-glow); text-align: center; width: 100%; max-width: 400px; }
        .login-box h2 { color: var(--neon-blue); margin-bottom: 2rem; font-size: 2rem; text-shadow: 0 0 10px var(--neon-blue); text-transform: uppercase; letter-spacing: 2px;}
        
        input { width: 100%; background: #0b1120; color: var(--text-light); padding: 1rem; border: 1px solid var(--border); border-radius: 4px; font-size: 1.2rem; outline: none; margin-bottom: 1.5rem; text-align: center; letter-spacing: 3px; transition: all 0.3s;}
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px var(--border-glow); }
        
        button { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); padding: 1rem; border-radius: 4px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s;}
        button:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }
        .error { color: var(--neon-pink); margin-top: 1rem; font-weight: bold; display: none; text-shadow: 0 0 10px var(--neon-pink); }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Portal Admin</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Acceso exclusivo al panel maestro.</p>
        <input type="password" id="pass" placeholder="CONTRASEÑA" onkeypress="if(event.key === 'Enter') login()">
        <button onclick="login()">Ingresar al Sistema</button>
        <div id="errorMsg" class="error">❌ Contraseña Incorrecta</div>
    </div>

    <script>
        if(sessionStorage.getItem('adminAuth') === 'true') { window.location.href = 'dashboard.html'; }

        function login() {
            const pass = document.getElementById('pass').value;
            // CONTRASEÑA POR DEFECTO
            if(pass === 'admin123') {
                sessionStorage.setItem('adminAuth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 3000);
            }
        }
    </script>
</body>
</html>
