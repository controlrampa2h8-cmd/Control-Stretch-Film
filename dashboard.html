<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Stretch Control</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb; 
            --white: #ffffff;
            
            /* Colores Neón y Modo Oscuro */
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --neon-blue: #00f3ff;
            --neon-pink: #ff007f;
            --neon-green: #39ff14;
            --neon-orange: #ff9d00;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(0, 243, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); }
        
        /* Navegación - Mantiene la estructura pero adapta los colores */
        nav { background-color: #0b1120; padding: 1rem; color: var(--white); display: flex; flex-wrap: wrap; gap: 1rem; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon-blue); box-shadow: 0 0 15px var(--border-glow); }
        .nav-links a { text-decoration: none; color: var(--text-muted); font-size: 1rem; padding: 0.5rem 1rem; border-radius: 4px; transition: all 0.3s; }
        .nav-links a:hover { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }
        .nav-links a.active { color: var(--neon-blue); font-weight: bold; text-shadow: 0 0 10px var(--neon-blue); }

        .container { max-width: 1400px; margin: 2rem auto; padding: 0 1rem; }
        
        /* Controles Superiores */
        .header-controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 2rem; }
        .header-controls h2 { color: var(--white); text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        
        /* Filtros Neón */
        .filtros { display: flex; gap: 0.5rem; background: var(--panel-bg); padding: 0.5rem; border-radius: 8px; border: 1px solid #334155; }
        .btn-filtro { background: transparent; border: none; color: var(--text-muted); padding: 0.5rem 1.5rem; border-radius: 4px; cursor: pointer; font-weight: bold; transition: all 0.3s; }
        .btn-filtro:hover { color: var(--white); }
        .btn-filtro.active { background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); box-shadow: 0 0 10px var(--border-glow); border: 1px solid var(--neon-blue); }

        .btn-export { background: transparent; color: var(--neon-green); border: 2px solid var(--neon-green); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 0.5rem;}
        .btn-export:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 15px var(--neon-green); }

        /* Tarjetas de Estadísticas */
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .card { padding: 1.5rem; background: var(--panel-bg); border-radius: 12px; border: 1px solid #334155; text-align: center; position: relative; overflow: hidden; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        
        /* Brillos específicos para tarjetas */
        .card.card-blue { border-bottom: 3px solid var(--neon-blue); box-shadow: 0 5px 15px rgba(0, 243, 255, 0.1); }
        .card.card-blue h3 { color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        
        .card.card-orange { border-bottom: 3px solid var(--neon-orange); box-shadow: 0 5px 15px rgba(255, 157, 0, 0.1); }
        .card.card-orange h3 { color: var(--neon-orange); text-shadow: 0 0 10px rgba(255, 157, 0, 0.5); }
        
        .card.card-green { border-bottom: 3px solid var(--neon-green); box-shadow: 0 5px 15px rgba(57, 255, 20, 0.1); }
        .card.card-green h3 { color: var(--neon-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        
        .card.card-pink { border-bottom: 3px solid var(--neon-pink); box-shadow: 0 5px 15px rgba(255, 0, 127, 0.1); }
        .card.card-pink h3 { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }

        .card h3 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .card p { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* Contenedores de Gráficos */
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .chart-box { background: var(--panel-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .chart-box.full-width { grid-column: 1 / -1; }
        .chart-container { height: 300px; position: relative; width: 100%; }
        
        .chart-title { color: var(--white); font-size: 1.1rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>
    <nav>
        <h2 style="color: var(--neon-blue); text-shadow: 0 0 10px var(--border-glow);">📦 Stretch Control</h2>
        <div class="nav-links">
            <a href="conductor.html">1. Conductor</a>
            <a href="seguridad.html">2. Seguridad</a>
            <a href="rampa.html">3. Rampa</a>
            <a href="dashboard.html" class="active">Dashboard & Reportes</a>
        </div>
    </nav>

    <div class="container">
        <div class="header-controls">
            <h2>Panel de Análisis Interactivos</h2>
            
            <div class="filtros">
                <button class="btn-filtro active" onclick="cambiarPeriodo('DIARIO', this)">Diario</button>
                <button class="btn-filtro" onclick="cambiarPeriodo('SEMANAL', this)">Semanal</button>
                <button class="btn-filtro" onclick="cambiarPeriodo('MENSUAL', this)">Mensual</button>
                <button class="btn-filtro" onclick="cambiarPeriodo('ANUAL', this)">Anual</button>
            </div>

            <button class="btn-export" onclick="exportarExcel()">
                📊 Exportar a Excel (.XLSX)
            </button>
        </div>

        <div class="dashboard-cards">
            <div class="card card-blue">
                <h3 id="statTotal">0</h3>
                <p>Registros Totales</p>
            </div>
            <div class="card card-orange">
                <h3 id="statPendientes">0</h3>
                <p>Pendientes de Liquidar</p>
            </div>
            <div class="card card-green">
                <h3 id="statLiquidados">0</h3>
                <p>Liquidados</p>
            </div>
            <div class="card card-pink">
                <h3 id="statVencidos">0</h3>
                <p>Vencidos (> 3 min)</p>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-box">
                <h3 class="chart-title">Consumo Neto por Empresa (Rollos)</h3>
                <div class="chart-container"><canvas id="chartEmpresa"></canvas></div>
            </div>
            <div class="chart-box">
                <h3 class="chart-title">Estado Actual de Solicitudes</h3>
                <div class="chart-container" style="display: flex; justify-content: center;"><canvas id="chartEstados"></canvas></div>
            </div>
            <div class="chart-box full-width">
                <h3 class="chart-title" id="tituloTendencia">Tendencia de Solicitudes</h3>
                <div class="chart-container"><canvas id="chartTendencia"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        let registrosGlobales = JSON.parse(localStorage.getItem('stretchFilmData')) || [];
        let periodoActual = 'DIARIO';
        let datosFiltrados = [];

        // Instancias de gráficos
        let chartEmpresaInst, chartEstadosInst, chartTendenciaInst;

        // --- COLORES NEÓN PARA GRÁFICOS ---
        const colorNeons = [
            'rgba(0, 243, 255, 0.8)',   // Blue
            'rgba(255, 0, 127, 0.8)',   // Pink
            'rgba(57, 255, 20, 0.8)',   // Green
            'rgba(255, 157, 0, 0.8)',   // Orange
            'rgba(189, 0, 255, 0.8)'    // Purple
        ];
        const colorBorders = [
            '#00f3ff', '#ff007f', '#39ff14', '#ff9d00', '#bd00ff'
        ];

        // Configuración global por defecto de Chart.js para modo oscuro
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#334155';

        // --- FILTRADO DE DATOS ---
        function cambiarPeriodo(periodo, btnElement) {
            periodoActual = periodo;
            
            // Actualizar botones
            document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Filtrar Base de datos
            const hoy = new Date();
            datosFiltrados = registrosGlobales.filter(reg => {
                const fechaReg = new Date(reg.fechaHoraIngreso);
                
                if(periodo === 'DIARIO') {
                    return fechaReg.toLocaleDateString() === hoy.toLocaleDateString();
                } 
                else if(periodo === 'SEMANAL') {
                    const hace7Dias = new Date();
                    hace7Dias.setDate(hoy.getDate() - 7);
                    return fechaReg >= hace7Dias;
                }
                else if(periodo === 'MENSUAL') {
                    return fechaReg.getMonth() === hoy.getMonth() && fechaReg.getFullYear() === hoy.getFullYear();
                }
                else if(periodo === 'ANUAL') {
                    return fechaReg.getFullYear() === hoy.getFullYear();
                }
                return true;
            });

            actualizarTarjetas();
            renderizarGraficos();
        }

        // --- ACTUALIZAR TARJETAS ---
        function actualizarTarjetas() {
            document.getElementById('statTotal').innerText = datosFiltrados.length;
            
            const pendientes = datosFiltrados.filter(r => r.estado === "PENDIENTE LIQUIDAR" || r.estado === "PENDIENTE VALIDACION").length;
            document.getElementById('statPendientes').innerText = pendientes;
            
            document.getElementById('statLiquidados').innerText = datosFiltrados.filter(r => r.estado === "LIQUIDADO").length;
            
            const vencidos = datosFiltrados.filter(r => r.estado === "PENDIENTE LIQUIDAR" && Math.floor((new Date() - new Date(r.fechaHoraValidacion)) / 60000) >= 3).length;
            document.getElementById('statVencidos').innerText = vencidos;
        }

        // --- RENDERIZAR GRÁFICOS INTERACTIVOS ---
        function renderizarGraficos() {
            
            // 1. Gráfico de Consumo por Empresa (Barras)
            const consumoEmpresa = {};
            datosFiltrados.filter(r => r.estado === "LIQUIDADO").forEach(r => {
                const neto = r.cantidadStretch - (r.cantidadDevuelta || 0);
                consumoEmpresa[r.empresa] = (consumoEmpresa[r.empresa] || 0) + neto;
            });

            if(chartEmpresaInst) chartEmpresaInst.destroy();
            chartEmpresaInst = new Chart(document.getElementById('chartEmpresa'), {
                type: 'bar',
                data: {
                    labels: Object.keys(consumoEmpresa).length ? Object.keys(consumoEmpresa) : ['Sin datos'],
                    datasets: [{
                        label: 'Rollos Consumidos',
                        data: Object.keys(consumoEmpresa).length ? Object.values(consumoEmpresa) : [0],
                        backgroundColor: colorNeons,
                        borderColor: colorBorders,
                        borderWidth: 2,
                        borderRadius: 6
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            // 2. Gráfico de Estados (Dona)
            let stPend = 0, stLiq = 0, stVen = 0;
            datosFiltrados.forEach(r => {
                if(r.estado === "LIQUIDADO") stLiq++;
                else if(r.estado === "PENDIENTE LIQUIDAR" && Math.floor((new Date() - new Date(r.fechaHoraValidacion)) / 60000) >= 3) stVen++;
                else stPend++;
            });

            if(chartEstadosInst) chartEstadosInst.destroy();
            chartEstadosInst = new Chart(document.getElementById('chartEstados'), {
                type: 'doughnut',
                data: {
                    labels: ['Pendientes', 'Liquidados', 'Vencidos'],
                    datasets: [{
                        data: (stPend===0 && stLiq===0 && stVen===0) ? [1] : [stPend, stLiq, stVen],
                        backgroundColor: (stPend===0 && stLiq===0 && stVen===0) ? ['#334155'] : ['rgba(255, 157, 0, 0.8)', 'rgba(57, 255, 20, 0.8)', 'rgba(255, 0, 127, 0.8)'],
                        borderColor: '#1e293b',
                        borderWidth: 3,
                        hoverOffset: 10
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { position: 'bottom' } } }
            });

            // 3. Gráfico de Tendencia (Línea)
            const agrupacion = {};
            datosFiltrados.forEach(r => {
                const d = new Date(r.fechaHoraIngreso);
                // Agrupar por hora si es diario, por día si es otro
                let clave = periodoActual === 'DIARIO' ? `${d.getHours()}:00` : d.toLocaleDateString('es-PE', {day:'2-digit', month:'short'});
                agrupacion[clave] = (agrupacion[clave] || 0) + 1;
            });

            document.getElementById('tituloTendencia').innerText = periodoActual === 'DIARIO' ? 'Tendencia de Solicitudes (Por Hora)' : 'Tendencia de Solicitudes (Por Día)';

            if(chartTendenciaInst) chartTendenciaInst.destroy();
            chartTendenciaInst = new Chart(document.getElementById('chartTendencia'), {
                type: 'line',
                data: {
                    labels: Object.keys(agrupacion).length ? Object.keys(agrupacion).sort() : ['Sin datos'],
                    datasets: [{
                        label: 'Cant. de Solicitudes',
                        data: Object.keys(agrupacion).length ? Object.keys(agrupacion).sort().map(k => agrupacion[k]) : [0],
                        borderColor: '#00f3ff',
                        backgroundColor: 'rgba(0, 243, 255, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#00f3ff',
                        pointRadius: 4,
                        pointHoverRadius: 8
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // --- EXPORTAR A EXCEL (.XLSX) PROFESIONAL ---
        window.exportarExcel = function() {
            if(datosFiltrados.length === 0) {
                alert("No hay datos en el periodo seleccionado para exportar.");
                return;
            }

            // Preparar y limpiar los datos para el Excel
            const datosExcel = datosFiltrados.map(r => ({
                "ID Registro": r.id,
                "Fecha/Hora Ingreso": new Date(r.fechaHoraIngreso).toLocaleString('es-PE'),
                "Placa": r.placa,
                "Empresa": r.empresa,
                "Tipo de Consumo": r.tipoConsumo,
                "N° Guía": r.numeroGuia,
                "Cant. Solicitada": r.cantidadStretch,
                "Teléfono": r.telefono,
                "Estado Final": r.estado,
                "Fecha/Hora Autorización": r.fechaHoraValidacion ? new Date(r.fechaHoraValidacion).toLocaleString('es-PE') : 'N/A',
                "Fecha/Hora Liquidación": r.fechaHoraLiquidacion ? new Date(r.fechaHoraLiquidacion).toLocaleString('es-PE') : 'N/A',
                "Cant. Devuelta": r.cantidadDevuelta !== null ? r.cantidadDevuelta : 0,
                "Consumo Neto Real": r.estado === "LIQUIDADO" ? (r.cantidadStretch - (r.cantidadDevuelta || 0)) : 0
            }));

            // Crear el libro y la hoja usando SheetJS
            const workbook = XLSX.utils.book_new();
            const worksheet = XLSX.utils.json_to_sheet(datosExcel);
            
            // Ajustar ancho de columnas automáticamente
            const colWidths = [
                {wch: 15}, {wch: 20}, {wch: 10}, {wch: 25}, {wch: 15}, 
                {wch: 15}, {wch: 15}, {wch: 12}, {wch: 20}, {wch: 20}, 
                {wch: 20}, {wch: 15}, {wch: 18}
            ];
            worksheet['!cols'] = colWidths;

            XLSX.utils.book_append_sheet(workbook, worksheet, `Reporte_${periodoActual}`);
            
            // Descargar el archivo nativo .xlsx
            const nombreArchivo = `StretchControl_Reporte_${periodoActual}_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(workbook, nombreArchivo);
        }

        // Inicializar
        window.addEventListener('storage', () => { 
            registrosGlobales = JSON.parse(localStorage.getItem('stretchFilmData')) || []; 
            // Re-ejecutar el filtro actual para actualizar vista
            cambiarPeriodo(periodoActual, document.querySelector('.btn-filtro.active')); 
        });
        
        // Simular clic en el primer botón para cargar vista Diaria por defecto
        cambiarPeriodo('DIARIO', document.querySelector('.btn-filtro'));
    </script>
</body>
</html>
